# OAK-Drive-Sync — Drive Hardware Configuration
# 2x GPIO linear motors + 2x Tinkerforge Silent Stepper Bricklet 2.0
#
# NOTE: min/max positions are NOT set here — they are determined by
# manual calibration via the GUI on each startup (Calibration tab).

broker:
  host: "localhost"
  port: 1883

# Pause after drive reaches position before notifying cameras (ms)
settling_delay_ms: 150

drives:
  cam1:
    axis_a:                       # GPIO linear motor — PUL + DIR pin control
      type: gpio
      step_pin: 14                # PUL1 — GPIO 14
      dir_pin: 15                 # DIR1 — GPIO 15
      steps_per_unit: 200         # steps per unit of position — adjust for your motor/gearing
      max_speed: 1000             # max steps/second
      invert_direction: false
      pulse_delay: 0.00001        # seconds per half-pulse (0.00001 = 10µs → 20µs/step → ~50kHz)

    axis_b:                       # Tinkerforge Silent Stepper Bricklet 2.0
      type: tinkerforge
      uid: "2eoB"                 # Bricklet UID (found via Brick Viewer)
      host: "localhost"           # Brick Daemon host (localhost if USB)
      port: 4223                  # Brick Daemon port
      max_velocity: 2000          # steps/second
      acceleration: 1000          # steps/second²
      deceleration: 1000          # steps/second²
      step_resolution: 8          # microstepping (1,2,4,8,16,32,64,128,256)
      motor_current: 1200         # mA — increase if motor doesn't move

  cam2:
    axis_a:                       # GPIO linear motor — PUL + DIR pin control
      type: gpio
      step_pin: 16                # PUL2 — GPIO 16
      dir_pin: 17                 # DIR2 — GPIO 17
      steps_per_unit: 200
      max_speed: 1000
      invert_direction: false
      pulse_delay: 0.00001        # seconds per half-pulse (0.00001 = 10µs → 20µs/step → ~50kHz)

    axis_b:                       # Tinkerforge Silent Stepper Bricklet 2.0
      type: tinkerforge
      uid: "2eoz"                 # Second bricklet UID
      host: "localhost"
      port: 4223
      max_velocity: 2000
      acceleration: 1000
      deceleration: 1000
      step_resolution: 8
      motor_current: 1200         # mA

# GUI settings
gui:
  host: "0.0.0.0"
  port: 8080
  title: "OAK Drive Controller"
