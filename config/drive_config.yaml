# OAK-Drive-Sync — Drive Hardware Configuration
# 2x GPIO linear motors + 2x Tinkerforge Silent Stepper Bricklet 2.0

broker:
  host: "localhost"
  port: 1883

# Pause after drive reaches position before notifying cameras (ms)
settling_delay_ms: 150

drives:
  cam1:
    axis_a:                       # GPIO linear motor — single pin control
      type: gpio
      step_pin: 15                # GPIO 15 — one motor per pin, no dir_pin needed
      # dir_pin: null             # uncomment and set if your driver has a direction pin
      # enable_pin: null          # uncomment and set if your driver has an enable pin
      steps_per_unit: 200         # steps per unit of position — adjust for your motor/gearing
      max_speed: 1000             # max steps/second
      max_position: 10000         # user will configure once hardware range is known
      home_position: 0            # bottom position (start point)
      invert_direction: false

    axis_b:                       # Tinkerforge Silent Stepper Bricklet 2.0
      type: tinkerforge
      uid: "2eoB"                 # Bricklet UID (found via Brick Viewer)
      host: "localhost"           # Brick Daemon host (localhost if USB)
      port: 4223                  # Brick Daemon port
      min_position: 1500
      max_position: 9500
      max_velocity: 2000          # steps/second
      acceleration: 1000          # steps/second²
      deceleration: 1000          # steps/second²
      step_resolution: 8          # microstepping (1,2,4,8,16,32,64,128,256)
      motor_current: 1200         # mA — increase if motor doesn't move (max depends on motor)

  cam2:
    axis_a:                       # GPIO linear motor — single pin control
      type: gpio
      step_pin: 17                # GPIO 17 — separate pin from cam1
      steps_per_unit: 200
      max_speed: 1000
      max_position: 10000
      home_position: 0
      invert_direction: false

    axis_b:                       # Tinkerforge Silent Stepper Bricklet 2.0
      type: tinkerforge
      uid: "2eoz"                 # Second bricklet UID
      host: "localhost"
      port: 4223
      min_position: 1500
      max_position: 9500
      max_velocity: 2000
      acceleration: 1000
      deceleration: 1000
      step_resolution: 8
      motor_current: 1200         # mA

# GUI settings
gui:
  host: "0.0.0.0"
  port: 8080
  title: "OAK Drive Controller"
