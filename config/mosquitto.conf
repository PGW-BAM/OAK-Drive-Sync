# OAK-Drive-Sync — Mosquitto drop-in config
# Place in: /etc/mosquitto/conf.d/oak-drive-sync.conf
#
# This is a DROP-IN config — it extends the base /etc/mosquitto/mosquitto.conf.
# Do NOT duplicate settings already in the base config (persistence, logging, etc.)
# as that causes conflicts and blocks the broker from starting.

# Listen on all interfaces (LAN only — no internet exposure)
listener 1883 0.0.0.0

# Phase 1: allow anonymous on trusted LAN
allow_anonymous true
