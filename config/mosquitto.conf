# Mosquitto MQTT Broker Configuration
# Runs on Raspberry Pi 5 alongside the drive controller.
# Location on Pi: /etc/mosquitto/conf.d/oak-drive-sync.conf

# ── Listener ──────────────────────────────────
listener 1883 0.0.0.0
protocol mqtt

# Optional TLS listener (Phase 2 — uncomment and configure)
# listener 8883 0.0.0.0
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# cafile /etc/mosquitto/certs/ca.crt
# tls_version tlsv1.2

# ── Authentication ────────────────────────────
# Phase 1: allow anonymous on trusted LAN
allow_anonymous true

# Phase 2: password file authentication (uncomment)
# allow_anonymous false
# password_file /etc/mosquitto/passwd

# ── Persistence ───────────────────────────────
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 60

# ── Message Limits ────────────────────────────
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 65536

# ── Session ───────────────────────────────────
max_keepalive 60

# ── Logging ───────────────────────────────────
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Connection tuning ─────────────────────────
# Retained messages are used for drive positions and connectivity state.
# Ensure persistence is on so they survive broker restarts.
retain_available true
