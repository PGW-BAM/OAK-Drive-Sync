# IMU-based drift detection calibration
# ─────────────────────────────────────
# Edit steps_per_degree after running calibration to determine the
# conversion factor between drive steps and camera angle (degrees).
#
# Checkpoints are defined per camera + axis_b (Tinkerforge radial drives only).
# Up to 4 checkpoints per drive. Each checkpoint records:
#   - name:               unique label shown in GUI and drift events
#   - drive_position:     Tinkerforge step count at this position
#   - expected_roll_deg:  IMU roll angle captured during calibration
#   - expected_pitch_deg: IMU pitch angle captured during calibration
#   - active_angle:       which angle to use for drift check ("roll" or "pitch")

drift_threshold_deg: 2.0   # degrees of drift before auto-correction triggers

checkpoints:
  cam1:
    b: []   # add via GUI or manually
  cam2:
    b: []   # add via GUI or manually

steps_per_degree:
  cam1_b: 120.0   # overwritten on each service start by auto_calibrator
  cam2_b: 120.0

# Populated at each service startup by the auto-calibration routine
# (src/pi_controller/imu/auto_calibrator.py). Absolute motor-step count at
# which the IMU active angle reads the per-camera reference angle (−90° for
# cam1's upside-down mounting, +90° for cam2). Runtime code computes
#   coarse_target = reference_position
#                 + (target_angle_deg - reference_angle_deg) * spd * sign
# and lets converge() fine-tune afterwards. Never read from disk at runtime;
# persisted for operator inspection between runs.
reference_position:
  cam1_b: null
  cam2_b: null

# Auto-detected per startup from the sign of the first IMU reading: cam1 is
# always mounted upside-down so reads negative (→ −90°); cam2 is right-side-
# up so reads positive (→ +90°). Persisted so operators can inspect which
# anchor was chosen on the last run.
reference_angle_deg:
  cam1_b: null
  cam2_b: null

# Startup auto-calibration routine. Runs on every service boot after drives
# connect, MQTT is subscribed, and IMU telemetry is flowing. Discovers the
# reference_position + reference_angle_deg + steps_per_degree fresh; falls
# back gracefully if the IMU is offline or the drive is stuck.
auto_calibration:
  enabled: true
  active_angle:
    cam1_b: roll
    cam2_b: roll
  probe_steps: 400            # Phase 1: direction probe step size
                              # (wider than motion_threshold_deg noise band at
                              # realistic steps-per-degree — a real response
                              # should clear 0.2° cleanly; 200 was borderline
                              # and sometimes read as "no response")
  measure_steps: 500          # Phase 3: steps-per-degree fit displacement
  reference_threshold_deg: 0.5 # Phase 2 convergence to |angle − ref| <= this
  motion_threshold_deg: 0.2   # Phase 1/3 minimum detectable angle change
  max_iterations: 30          # Phase 2 Newton-search budget
  max_step_per_iter: 400      # per-iteration clamp — halved from 1000 to limit
                              # overshoot into physical end-stops. At ~100 steps/
                              # degree this caps each correction at 4°; the camera
                              # still reaches a 46°-away target in ~12 iterations
                              # (within max_iterations:30) while never overshooting
                              # more than 4° past the target.
  safety_travel: 8000         # abort Phase 2 if drive drifts this far from start
  settle_speed: 0.3           # slow: gentler stop → cleaner post-move IMU reading.
                              # Kept at 0.3 because below that the motor can
                              # struggle to overcome static friction on an
                              # unevenly-loaded radial drive; imu_settle_ms
                              # handles the post-move oscillation instead.
  motor_current_boost_mA: 1800 # temporarily raise Tinkerforge motor current
                              # during auto-cal. The Silent Stepper 2.0 has no
                              # stall detection — when a cam is parked near
                              # ±90° roll, gravity can stall the motor at the
                              # default 1200 mA while the bricklet still fires
                              # position_reached, producing flat IMU across
                              # every probe. 1800 mA gives enough torque to
                              # break free. Original current is restored when
                              # auto-cal exits. Set to 0 to disable the boost.
  imu_settle_ms: 400          # wait this long after each move before sampling
                              # the IMU — accelerometer-derived roll swings for
                              # several hundred ms after the motor stops; a too-
                              # short delay makes us mis-classify a settling
                              # reading as "angle_stuck"

# Closed-loop angle convergence (used when Windows sends target_angle_deg).
# The drive is nudged toward the camera-IMU target angle over multiple iterations
# until |measured - target| <= threshold_deg or max_iterations is exhausted.
# On success the drive's internal position counter is overwritten with the
# resync_position from the MoveCommand so cumulative nudges don't drift the
# soft min/max envelope.
convergence:
  max_iterations: 30                  # raised from 20 to match auto-cal budget
  max_step_per_iter: 400              # per-iteration motor-step clamp (~4°);
                                      # replaces max_correction_deg:20° to kill
                                      # the manual-angle overshoot (2400 steps
                                      # → 4° in one shot is too violent).
  motion_threshold_deg: 0.2           # min IMU response to treat as "motor moved"
  threshold_deg: 0.3                  # convergence window
  settle_speed: 0.3                   # Tinkerforge velocity during Newton steps
  seed_speed: 0.8                     # open-loop pre-move speed when seeding
                                      # from angle_history (coarse → fast).
  stale_seed_tolerance_steps: 2000    # after auto-cal rediscovers reference_position,
                                      # drop history entries further than this from
                                      # the new formula-derived position.
  settle_ms: 400                      # wait between motor move and IMU sample
  steps_per_degree_sign:
    cam1_b: 1     # flip to -1 if a positive step decreases the IMU angle
    cam2_b: -1    # confirmed from issue #7 probe: +200 steps → −0.882° (delta<0)
                  # positive motor steps make cam2 MORE negative → direction = -1

# Populated at runtime when a manual converge succeeds. Keys are 0.5°-
# bucketed signed target angles (e.g. "-75.0"); values are the motor step
# count observed to put the IMU at that angle. Used to seed the next move
# to the same angle so the Newton loop only needs small-step corrections.
# Pruned (not wiped) on auto-cal when the reference_position shifts by more
# than stale_seed_tolerance_steps.
angle_history:
  cam1_b: {}
  cam2_b: {}
